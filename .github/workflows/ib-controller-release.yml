name: IB Controller Release

on:
  #schedule:
  #  - cron: "0 6 * * *"
  workflow_dispatch:

defaults:
  run:
    shell: "bash -Eeuo pipefail -x {0}"

env:
  SRC_REPO: https://github.com/IbcAlpha/IBC.git
jobs:
  detect-release:
    runs-on: ubuntu-latest
    outputs:
      update: ${{ steps.check-update.outputs.has_update }}
    strategy:
      fail-fast: true

    steps:
      - uses: actions/checkout@v4

      - name: Get latest version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          build_version=$(gh release list -R ${{ env.SRC_REPO }} --exclude-drafts --exclude-pre-releases | grep 'Latest' | cut -f3)
          echo "build_version=$build_version" >> $GITHUB_OUTPUT

      - name: Check for an update
        id: check-update
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list > /tmp/ibcontroller-releases
          if grep -qF 'ibcontroller-${{ steps.version.outputs.build_version }}' /tmp/ibcontroller-releases
          then
            echo "has_update=false" >> $GITHUB_OUTPUT
          else
            echo "has_update=true" >> $GITHUB_OUTPUT
          fi

      - name: Download the update
        if: ${{ steps.check-update.outputs.has_update == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dest='ibcontroller-${{ steps.version.outputs.build_version }}-linux.zip'
          gh release download ${{ steps.version.outputs.build_version }} -R ${{ env.SRC_REPO }} -p '*Linux*.zip' && mv *Linux*.zip "$dest"
          sha256sum "$dest" > "${dest}.sha256"

      - name: Create release
        if: ${{ steps.check-update.outputs.has_update == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create 'ibcontroller-${{ steps.version.outputs.build_version }}' \
            -t 'IB Controller ${{ steps.version.outputs.build_version }}' \
            -n 'IB Controller ${{ steps.version.outputs.build_version }} release files' \
            ibcontroller-*
